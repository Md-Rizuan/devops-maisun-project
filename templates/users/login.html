<!DOCTYPE html>
<html lang="en" dir="ltr" data-nav-layout="vertical" data-vertical-style="overlay" data-theme-mode="light"
    data-header-styles="light" data-menu-styles="light" data-toggled="close">

<head>

    <!-- Meta Data -->
    <meta charset="UTF-8">
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title> {{app_name}} </title>
    <meta name="description" content="Maisun">
    <meta name="author" content="Maisun" />
    <meta name="keywords" content="Maisun">


    <!-- Favicon -->
    <link rel="icon" href="{{static_server}}/img/favicon.ico" type="image/x-icon">
    {% comment %} <!-- Main Theme Js -->
    <script src="{{static_server}}/js/authentication-main.js"></script> {% endcomment %}

    <!-- Bootstrap Css -->
    <link id="style" href="{{static_server}}/libs/bootstrap/css/bootstrap.min.css" rel="stylesheet">

    <!-- Style Css -->
    <link href="{{static_server}}/css/styles.min.css" rel="stylesheet">
    <link href="{{static_server}}/css/notify.css" rel="stylesheet" />
    <!-- Icons Css -->
    <link href="{{static_server}}/css/icons.min.css" rel="stylesheet">
    <!-- jQuery Confirm CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-confirm/3.3.4/jquery-confirm.min.css">
    <!-- jQuery UI -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.css">

    <style>
        @font-face {
            {% comment %} src: "url(/static/main-theme/fonts/kalpurush.ttf)"; {% endcomment %}
            {% comment %} font-family: kalpurush; {% endcomment %}
            {% comment %} unicode-range: U+980-9FF; {% endcomment %}
        }

        *,
        body {
            {% comment %} font-family: kalpurush, serif !important; {% endcomment %}
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: kalpurush, serif;
        }

        .input-container {
            position: relative;
            width: 100%;
        }

        .input-container #lock-icon,
        .input-container #eye-icon {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            padding: 12px;
            color: #aaa;
        }

        .input-container #eye-icon {
            right: 10px;
            cursor: pointer;
            font-size: 1.4rem;
            color: #333;
        }


        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #dfdfdf;
            border-radius: 50%;
            border-top-color: #747171;
            animation: spin 1s infinite linear;
        }

        

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }


        @media screen and (max-width:480px) {}


        @media (max-width: 600px) {}
    </style>
</head>

<body class="error-page1" style="position: relative; background-image: url('{{home_theme_server}}/images/dfpfooter.png');">
    <div class="bg-svg">
        <div class="page">
            <div class="z-index-10">
                <div class="container">
                    <div class="row">
                        <div
                            class="col-xl-5 col-lg-6 col-md-8 col-sm-8 col-xs-10 py-4 justify-content-center mx-auto my-auto">
                            <div class="card-sigin ">
                                {% csrf_token %}
                                <!-- Demo content-->
                                <div class="main-card-signin">
                                    <div class="wd-100p">
                                        <div class="d-flex justify-content-center">
                                            <a href="{% url 'core:home' %}">
                                                <img src="{{static_server}}/img/logo.png"
                                                    class="logo-dark" alt="logo" style="height:60px;">
                                            </a>
                                        </div>
                                        <div class="mt-3">
                                            {% comment %} <h2 class="text-center" style="color:rgba(0, 0, 0, 0.8); font-weight: bold;">চলচ্চিত্র ও প্রকাশনা
                                                অধিদপ্তর</h2> {% endcomment %}
                                            

                                            <div style="display: flex; align-items: center; justify-content: center; padding: 0.5rem 0 0.8rem 0;">
                                                <svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="36" height="32" viewBox="0 0 36 32">
                                                    <path d="M24 24.082v-1.649c2.203-1.241 4-4.337 4-7.432 0-4.971 0-9-6-9s-6 4.029-6 9c0 3.096 1.797 6.191 4 7.432v1.649c-6.784 0.555-12 3.888-12 7.918h28c0-4.030-5.216-7.364-12-7.918z"></path>
                                                    <path d="M10.225 24.854c1.728-1.13 3.877-1.989 6.243-2.513-0.47-0.556-0.897-1.176-1.265-1.844-0.95-1.726-1.453-3.627-1.453-5.497 0-2.689 0-5.228 0.956-7.305 0.928-2.016 2.598-3.265 4.976-3.734-0.529-2.39-1.936-3.961-5.682-3.961-6 0-6 4.029-6 9 0 3.096 1.797 6.191 4 7.432v1.649c-6.784 0.555-12 3.888-12 7.918h8.719c0.454-0.403 0.956-0.787 1.506-1.146z"></path>
                                                </svg>
                                                <h6 class="text-center fw-bold" style="margin-bottom: 0; padding-bottom: 0; color: rgba(0, 0, 0, 0.8);">Login</h6>
                                            </div>

                                            <div class="panel-body p-0">
                                                <form action="#">
                                                    <div class="form-group mb-3">
                                                        <label for='username' class="form-label fw-bold">Username</label>
                                                        <input class="form-control" id='username' placeholder="Username"
                                                            type="text" style="border: 0; box-shadow: rgba(0, 0, 0, 0.05) 0px 0px 0px 1px; padding: .5rem .75rem; background-color:rgb(237, 237, 237);">
                                                    </div>
                                                    <div class="form-group  mb-3">
                                                        <label for='Password' class="form-label fw-bold">Password</label>
                                                        <div class="input-container">
                                                            <input class="form-control" id='loginpass'
                                                                placeholder="Password" type="password" style="border: 0; box-shadow: rgba(0, 0, 0, 0.05) 0px 0px 0px 1px; padding: .5rem .75rem; background-color:rgb(237, 237, 237);">
                                                            <i class="bi bi-eye" id="eye-icon"
                                                                style="cursor: pointer;"></i>
                                                        </div>

                                                    </div>
                                                    <div class="d-flex align-items-center justify-content-between gap-2">
                                                        <button class="btn login_btn d-flex align-items-center justify-content-center" style="width: 8rem; background-color: #01923E; color:rgba(255, 255, 255, .9)">
                                                            <b id="maisun-login-title">Login</b>
                                                            <span class="spinner" id="maisun-login-spinner" style="display: none;"></span>
                                                        </button>
                                                        <div>
                                                            {% comment %} <p class="mb-0 text-center"> Forget Password? &nbsp;
                                                                <a id="forgot-password-btn"
                                                                   
                                                                    href="{% url 'user:forget_password' %}" 
                                                                    style=" font-weight: 600; color:rgba(1, 146, 62, 100%);"
                                                                >Click here&nbsp;</a>
                                                            </p> {% endcomment %}
                                                        </div>
                                                    </div>
                                                </form>
                                            </div>
                                            {% comment %} <div class="tx-center mt-3">
                                                <p class="mb-0 text-muted">Don't have an account? <a href="signup.html"
                                                        class="text-primary fw-medium fs-15">Create an Account</a></p>
                                            </div> {% endcomment %}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="{{static_server}}/libs/bootstrap/js/bootstrap.bundle.min.js"></script>
    {% comment %}
    <script src="{{static_server}}/js/authentication.js"></script> {% endcomment %}
    <script src="{{static_server}}/js/notify.js"></script>
    <!-- Internal Two Step Verification JS -->
    <script src="{{static_server}}/js/two-step-verification.js"></script>
    <script src="{{static_server}}/js/jquery.min.js"></script>
    <!-- jQuery Confirm CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-confirm/3.3.4/jquery-confirm.min.css">
    <!-- jQuery UI -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.css">
    <script>
        $(document).ready(function () {

            var notyf = new Notyf({
                duration: 4000
            });

            function successMessage(message_) {
                notyf.success(message_);
            }

            function errorMessage(message_) {
                notyf.error(message_);
            }

            var showing_pass = false;
           $(document).on('click', '#eye-icon', function () {
                if (!showing_pass) {
                    $("#loginpass").attr("type", "text");
                    $(this).removeClass("bi-eye").addClass("bi-eye-slash");
                } else {
                    $("#loginpass").attr("type", "password");
                    $(this).removeClass("bi-eye-slash").addClass("bi-eye");
                }
                showing_pass = !showing_pass;
            });

            $("#loginpass").on('keyup', function (e) {
                e.preventDefault();
                if (e.keyCode === 13) {
                    $(".theLoginButton").click();
                }
            });

            let clicked = false;
            $(".login_btn").click(function (e) {
                e.preventDefault();
                if (clicked) {
                    return;
                }
                const username = $.trim($("#username").val());
                const password = $("#loginpass").val();

                const token = $('input[name="csrfmiddlewaretoken"]').eq(0).val();
                if (username.length === 0) {
                    errorMessage("Provide Username");
                    return;
                }
                if (password.length === 0) {
                    errorMessage("Provide Password");
                    return;
                }

                clicked = true;
                $("#maisun-login-title").hide();
                $("#maisun-login-spinner").show();

                const form_fields = {
                    csrfmiddlewaretoken: token,
                    username: username,
                    password: password,
                };

                $.ajax({
                    url: "{% url 'user:login' %}",
                    method: "POST",
                    data: form_fields,
                    success: function (data) {
                        if (data.status === 0) {
                            clicked = false;
                            $("#maisun-login-title").show();
                            $("#maisun-login-spinner").hide();
                            errorMessage("Username প্রদান করুন");
                        } else if (data.status === 1) {
                            clicked = false;
                            $("#maisun-login-title").show();
                            $("#maisun-login-spinner").hide();
                            errorMessage("Provide Password");
                        } else if (data.status === 2) {
                            successMessage("Login successfull");
                            setTimeout(() => {
                                window.location.reload();
                            }, 1000);
                        } else if (data.status === 3) {
                            clicked = false;
                            $("#maisun-login-title").show();
                            $("#maisun-login-spinner").hide();
                            errorMessage("Username or password is not correct");
                        } else if (data.status === 6) {
                            successMessage("Login successfull", "success");
                            setTimeout(() => {
                                const pre_password_url = "{% url 'user:pre_password_change' %}";
                                history.replaceState(null, '', pre_password_url);
                                window.location.href = pre_password_url;
                            }, 1000);
                        } else if (data.status === 4) {
                            clicked = false;
                            $("#maisun-login-title").show();
                            $("#maisun-login-spinner").hide();
                            errorMessage("User is not Active");
                        } else if (data.status === 7) {
                            clicked = false;
                            $("#maisun-login-title").show();
                            $("#maisun-login-spinner").hide();
                            errorMessage("You are not permitted");
                        
                        } else if (data.status === 101) {
                            clicked = false;
                            $("#maisun-login-title").show();
                            $("#maisun-login-spinner").hide();
                            errorMessage("স্বল্প সময়ের মধ্যে সীমার অতিরিক্ত রিকোয়েস্ট করা হয়েছে, পরবর্তীতে আবার চেষ্টা করুন");
                        } else if (data.status === 100) {
                            clicked = false;
                            $("#maisun-login-title").show();
                            $("#maisun-login-spinner").hide();
                            errorMessage("Sorry, Something went wrong");
                        }
                    },
                    error: function (e) {
                        clicked = false;
                        $("#maisun-login-title").show();
                        $("#maisun-login-spinner").hide();
                        errorMessage("Sorry, Something went wrong");
                    }
                });
            });
        });
    </script>
</body>

</html>
