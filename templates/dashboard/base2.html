    <script>
        var media_server = "{{ media_server }}";
        var notyf = new Notyf({
			duration:4000
		});

        function successMessage(message_) {
            notyf.success(message_);
        }

        function errorMessage(message_) {
            notyf.error(message_);
        }
        var validate = function(e) {
            
            var t = e.value;
           
            {% comment %} if (t.indexOf("-") >= 0) {
                e.value = t.replace(/-/g, ""); 
            } {% endcomment %}

            if (t.includes("-")) {
                e.value = t.replace(/-/g, ""); 
            }
            
            if (t.indexOf(".") >= 0){
                e.value = t.slice(0, t.indexOf(".") + 3);
            }
          }
        

        function showPreviewImage(input, requiredWidth = null, requiredHeight = null) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const fileInput = $(input);
                const reader = new FileReader();
                const img = new Image();

                reader.onload = function(e) {
                    img.src = e.target.result;

                    img.onload = function() {
                       
                        if (requiredWidth !== null && requiredHeight !== null) {

                            if (img.naturalWidth === requiredWidth && img.naturalHeight === requiredHeight) {

                                fileInput.closest('.image_div').find('.preview_image').attr('src', e.target.result).show();
                            }
                            else{
                                errorMessage(`Image should be ${requiredWidth}x${requiredHeight} dimensions`);
                                $(input).val(''); 
                                $(input).closest('.image_div').find('.preview_image').attr('src', '').hide();
                            }
                        }
                        else{
                            fileInput.closest('.image_div').find('.preview_image').attr('src', e.target.result).show();
                        }
                    };
                };
                reader.readAsDataURL(file);
            } else {
                $(input).closest('.image_div').find('.preview_image').attr('src', '').hide();
            }
        }

        function validateImage(input, options = {}) {
            let { requiredWidth = null, requiredHeight = null, maxSizeMB = null } = options;

            if (input.files && input.files[0]) {
                const file = input.files[0];
                const fileInput = $(input);
                const reader = new FileReader();
                const img = new Image();

                reader.onload = function (e) {
                    img.src = e.target.result;

                    img.onload = function () {
                        let isValid = true;

                        if (requiredWidth !== null && requiredHeight !== null) {
                            if (img.naturalWidth !== requiredWidth || img.naturalHeight !== requiredHeight) {
                                errorMessage(`Image should be ${requiredWidth}x${requiredHeight} dimensions`);
                                isValid = false;
                            }
                        }

                        if (maxSizeMB !== null) {
                            const fileSizeMB = file.size / 1024 / 1024;
                            if (fileSizeMB > maxSizeMB) {
                                errorMessage(`Image size should not be more than ${maxSizeMB} MB`);
                                isValid = false;
                            }
                        }

                        if (isValid || (requiredWidth === null && requiredHeight === null && maxSizeMB === null)) {
                            fileInput.closest('.image_div').find('.preview_image').attr('src', e.target.result).show();
                        } else {
                            $(input).val('');
                            fileInput.closest('.image_div').find('.preview_image').attr('src', '').hide();
                        }
                    };
                };

                reader.readAsDataURL(file);
            } else {
                $(input).closest('.image_div').find('.preview_image').attr('src', '').hide();
            }
        }

        function updateInputFiles(input, files_array) {
            let data_transfer = new DataTransfer();
        
            files_array.forEach(function(file) {
                data_transfer.items.add(file);
            });
        

            input.files = data_transfer.files;
        }

        let allSelectedFiles = [];

        function showMultiplePreviewImages(input) {
            let files_array = Array.from(input.files); 
            let preview_container = $(input).closest('.image_div').find('#image-preview');
        
            if (files_array.length > 0) {
                files_array.forEach(function(file, index) {
                    allSelectedFiles.push(file);
                    const fileIndexOnAllSelectedFileArray = allSelectedFiles.length - 1;

                    let reader = new FileReader();

                    reader.onload = function(e) {
                        
                        let imgWrapper = $('<div/>', {
                            'class': 'img-wrapper',
                            'style': 'position: relative; display: inline-block;'
                        });
        
                       
                        let img = $('<img/>', {
                            'src': e.target.result,
                            'class': 'preview_image',
                            'style': ' margin-right: 10px; margin-bottom: 10px;',
                            'alt': 'Selected Image'
                        });
        
                        
                        let close_button = $('<span/>', {
                            'class': 'close-button',
                            'html': '&times;', 
                            'data-index': fileIndexOnAllSelectedFileArray,
                            'style': ''
                        });
        
                        
                        imgWrapper.append(img).append(close_button);
                        preview_container.append(imgWrapper);

                        close_button.on('click', function() {
                            let file_index = $(this).parent().index(); 
                            let fileIndexOnArray = $(this).data('index');

                            if (file_index > -1) {
                                files_array.splice(file_index, 1); 
                                allSelectedFiles.splice(fileIndexOnArray, 1);
                                imgWrapper.remove();
                                updateInputFiles(input, files_array); 
                            }
                        });
                        
                    };
                    reader.readAsDataURL(file);
                });
            } else {
                preview_container.empty();
            }
        }

        function checkImageExtension(input) {
            const allowed_extensions = ["jpg", "jpeg", "png", "avif", "pdf"];
            if (input.files && input.files[0]) {
                const fileName = input.files[0].name;
                const extension = fileName.split('.').pop().toLowerCase();
                if (!allowed_extensions.includes(extension)) {
                    errorMessage("Select jpg, jpeg, png, avif, pdf");
                    $(input).val(''); 
                    $(input).closest('.image_div').find('.preview_image').attr('src', '').hide();
                    return false;
                }
            }
            return true;
        }

        function openImagesModal(title, images) {
            $('#images_modalLabel').text(title);
            $('#images_modal .modal-body').empty();
            
            images.forEach(function(image_url) {
                
                let img = $('<img>').attr('src',media_server + image_url).addClass('img-fluid');
                $('#images_modal .modal-body').append(img);
            });
            
            $('#images_modal').modal('show');
        }

        function isValidURL(url) {
            var regex = /^(https?:\/\/)?([a-zA-Z0-9.-]+)(\.[a-zA-Z]{2,})(:[0-9]+)?(\/.*)?$/;
            return regex.test(url);
        }

        function isValidSocialMediaVideoURL(url) {
            var regex = /^(https?:\/\/)?(www\.)?(facebook\.com|fb\.com|facebook\.watch|fb\.watch)\/.*\/videos\/.*|(https?:\/\/)?(www\.)?(facebook\.watch|fb\.watch|youtube\.com\/watch\?v=.+|youtu\.be\/.+)$/

            return regex.test(url);
        }

        function displayFileModal(fileUrl, fileName, heading, imageSrc) {
            $('#fileModal .modal-title').text(heading);
        
            let modalContent;
            const fileExtension = fileName.split('.').pop().toLowerCase();
            
            if (fileExtension === 'pdf') {
                modalContent = `<iframe src="${fileUrl}"  style="width: 100%; height: 80vh; max-height: 90vh; border: none;"  frameborder="0" allowfullscreen>
                                </iframe>`;
            } else {
                modalContent = `<img src="${fileUrl}" alt="${fileName}" style="width: 100%; max-height:81vh">`;
            }
           
        
            $('#fileModal .modal-body').html(modalContent);
            $('#fileModal').modal('show');
        }



        $(document).on('keyup change', '.integers_only', function(){
            this.value = this.value.replace(/\D/g,'');
        });

        $(document).on('keypress change', '.number_with_max', function() { 
            const maxAllowed = parseFloat($(this).attr('max')) || Infinity;
        
            if (!this.lastValidValue) {
                this.lastValidValue = this.value;
            }
         
            if (parseFloat(this.value) > maxAllowed) {
                this.value = this.lastValidValue; 
            } else {
                this.lastValidValue = this.value;  
            }
        });
        
        
        function IsValidFields(){
            let isValid = true;
            let scrolled = false;
            $(".error-message").remove();
            //let form_data = {};
            let form_data = new FormData();
            $(".required").each(function () {
                $(this).removeClass("error");
                if ($.trim($(this).val()).length === 0) {
                    $(this).addClass("error");
                    let error_message = $.trim($(this).siblings(".control-label").text());
                    if (error_message.length === 0) {
                        error_message = $.trim($(this).siblings().find(".control-label").text());
                    }
                    if (error_message.endsWith('*')) {
                        error_message = error_message.slice(0, -1)
                    }
                    error_message = '<span class="error-message">' + error_message + ' is required</span>';
                    if ($(this).siblings(".select2-container").length !== 0) {
                        $(this).siblings(".select2-container").after(error_message);
                        $(this).siblings(".select2-container").addClass('error');
                    } else {
                        $(this).after(error_message);
                    }
                    isValid = false;

                    if (!scrolled) {
                        $("html, body").animate({
                            "scrollTop": $(this).offset().top - 150
                        });
                        scrolled = true;
                    }

                    
                }else{
					//form_data[$.trim($(this).attr("id"))] = $.trim($(this).val());
					form_data.append($.trim($(this).attr("name")), $.trim($(this).val()));
				}
            });

            $(".required_radio").each(function () {
                const radioButtonName = $(this).find('input[type="radio"]').attr('name');
                const selected = $(`input[name="${radioButtonName}"]:checked`);
                if (selected.length === 0) {
                    isValid = false;
                    const error_message = '<p class="error-message">Please select an option</p>';
                    $(this).append(error_message);
                } else {
                    form_data.append(radioButtonName, selected.val());
                }
            });
			$(".optional").each(function(){
				//form_data[$.trim($(this).attr("id"))] = $.trim($(this).val());
                form_data.append($.trim($(this).attr("name")), $.trim($(this).val()));
			});
			if(!isValid){
				form_data = {};
			}
            return {is_valid:isValid, form_data:form_data};
        }

        function handleResponsiveTable() {
            if (window.innerWidth <= 991) {
                if (!$.fn.DataTable.isDataTable('#responsiveDataTable')) {
                    $("#responsiveDataTable").DataTable({
                        responsive: true,
                        paging: false,
                        searching: false,
                        bDestroy: true,
                        info: false,
                        ordering: false,
                        autoWidth: false,
                        order: [],
                        columnDefs: [
                            { responsivePriority: 1, targets: 0 },
                            { responsivePriority: 2, targets: -1 },
                        ],
                    });
                }
            } else {
                if ($.fn.DataTable.isDataTable('#responsiveDataTable')) {
                    $('#responsiveDataTable').DataTable().destroy();
                }
            }
        }
        

        $(document).ready(function () {
            const urlPath = window.location.pathname;
          
            $(".parent-menu").each(function () {
                if ($.trim($(this).children("a").attr("href")) === urlPath) {
                    $(this).addClass("active").addClass("current-page");
                    const parentName = $.trim($(this).children("a").children(".menu-text").text());
                    $(".top_heading_title").html(parentName);
                }
            });
            $(".child-menu").each(function () {
                if ($.trim($(this).children("a").attr("href")) === urlPath) {
                    $(this).children("a").addClass("active-sub");
                    $(this).parents(".treeview").addClass("active").addClass("current-page");
                    const childName = $.trim($(this).children("a").text());
                    const parentName = $.trim($(this).parents(".treeview").children("a").children(".menu-text").text());
                    $(".top_heading_title").html('<span class="top-parent-name">' + parentName + '</span> / '+childName);
                }
            });
            $(".top_heading_title").fadeIn(500);
            let isClicked = false;
            $(".pin-sidebar").click(function () {
                if(!isClicked){
                    $(".side-logo").attr("src", "{{static_server}}/images/logo_sm.png");
                }else{
                    $(".side-logo").attr("src", "{{static_server}}/images/logo.png");
                    
                }
                isClicked = !isClicked;
            });
            $(document).on('input keyup change paste', '.only_number', function () {
                const number__ = this;
                number__.value = number__.value.replace(/\D/g, '');
                setTimeout(function () {
                    number__.value = number__.value.replace(/\D/g, '');
                }, 50);
            });
        
            $(document).on('input keyup change paste', '.required', function () {
                const theSelect2__ = $(this).siblings(".select2.select2-container.select2-container--default");
                $(this).removeClass("error");
                if (theSelect2__.length !== 0) {
                    $(this).siblings(".select2.select2-container.select2-container--default").removeClass("error");
                }
                if ($(this).siblings(".error-message").length !== 0) {
                    $(this).siblings(".error-message").remove();
                }
                
            });
           
            $(document).on('input keyup change paste', '.fr-element', function () {
                const editor = $(this);
                const textarea = editor.closest('.fr-box').siblings('textarea.required');
                if (textarea.length) {
                    textarea.removeClass('error');
                    textarea.siblings('.error-message').remove();
                }
                editor.closest('.fr-wrapper').removeClass('error');
            });

            $(document).on('click', 'input[type="radio"]', function () {
                const radioGroup = $(this).closest('.required_radio');
    
                radioGroup.removeClass('error');
                radioGroup.find('.error-message').remove();
            });

            $('select').select2();

            $(document).on('input', '.count-characters', function () {
                const maxLength = parseFloat($(this).attr('maxlength')) || Infinity;
                let currentLength = $(this).val().length; 
                let countDiv = $(this).siblings('.count_div').find('.count');
            
                if (currentLength <= maxLength) {
                    countDiv.text(currentLength + '/' + maxLength); 
                } else {
                    $(this).val($(this).val().substring(0, maxLength)); 
                    countDiv.text(maxLength + '/' + maxLength);
                }
            });

            $(document).on('click', '.file-name', function () {
                const fileUrl = $(this).data('file-url');
                const fileName = $(this).data('file-name');
                const heading = $(this).data('heading');
                displayFileModal(fileUrl, fileName, heading);
            });

            $(document).on('change', '.file', function () {
                const input = $(this);
                const previewContainer = input.closest('.image_div').find('.image-preview');
                let heading = input.closest('.image_div').find('.file_label').text().replace('*', '').trim();
                const maxSizeMB = parseInt(input.data('max_size'));
               
                if (heading.length === 0) {
                    heading = input.data('error_text');
                }
            
                const allowedExtensions = ['pdf', 'png', 'jpeg', 'jpg'];
                previewContainer.empty();
            
                if (input[0].files && input[0].files.length > 0) {
                    const file = input[0].files[0]; 
                    const fileName = file.name;
                    const fileExtension = fileName.split('.').pop().toLowerCase();
                    const fileUrl = URL.createObjectURL(file);
                    const fileSizeMB = file.size / 1024 / 1024;
            
                    if (!allowedExtensions.includes(fileExtension)) {
                        errorMessage("Choose Correct File Type");
                        input.val('');
                        input.closest('.image_div').find('.preview_image').attr('src', '').hide();
                        return false;
                    }
            
                    
                    if (maxSizeMB) {
                        if (fileSizeMB > maxSizeMB) {
                            errorMessage(`File size should not be more than ${maxSizeMB} MB`);
                            input.val('');
                            input.closest('.image_div').find('.preview_image').attr('src', '').hide();
                            return false;
                        }
                    } else {
                        if (fileSizeMB > 1) {
                            errorMessage("File size should not be more than 1 MB");
                            input.val('');
                            input.closest('.image_div').find('.preview_image').attr('src', '').hide();
                            return false;
                        }
                    }
            
                
                    const filePreview = `
                        <div class='d-flex pb-2'>
                            <div class="file-name" data-file-url="${fileUrl}" data-heading="${heading}" data-file-name="${fileName}">
                                <span class="preview_title" style="cursor: pointer; text-decoration: none; color: blue;">${fileName}</span>
                            </div>
                            <div>
                                <button class="remove-file-button mx-2" style="">&times;</button>
                            </div>
                        </div>
                    `;
                    previewContainer.append(filePreview);
                }
            });

            function updateInputFiles(input, files_array) {
                const dataTransfer = new DataTransfer();
        
                files_array.forEach(function (file) {
                    dataTransfer.items.add(file);
                });
        
                input.files = dataTransfer.files; 
            }
        
            $(document).on('click', '.remove-file-button', function () {
                const filePreview = $(this).closest('.d-flex');
                const input = filePreview.closest('.image_div').find('input[type="file"]');
                let files_array = Array.from(input[0].files);
                let file_index = filePreview.index(); 
                let fileIndexOnArray = $(this).data('index'); 
                if (file_index > -1 && fileIndexOnArray > -1) {
                    files_array.splice(file_index, 1); 
                
                    filePreview.remove();
                    updateInputFiles(input[0], files_array);
                }
            });
            
        
            handleResponsiveTable();
            $(window).resize(handleResponsiveTable);
            
        });

    </script>
	
	{% block script %}
	
	{% endblock %}
    </body>
</html>
